<script>
let lastResult = "";

function generate() {
  try {
    const product = document.getElementById("product").value;
    const audience = document.getElementById("audience").value;
    const tone = document.getElementById("tone").value;
    const output = document.getElementById("output");

    if (!product || !audience) {
      output.innerHTML = "⚠️ Please fill all fields.";
      return;
    }

    output.innerHTML = "🤖 Generating...";

    setTimeout(() => {
      let text = "";

      if (tone === "luxury") {
        text = "✨ Discover " + product + ", crafted for " + audience +
        ". Premium quality and elegant design.";
      }

      else if (tone === "friendly") {
        text = "😊 Meet your new favorite " + product +
        "! Perfect for " + audience + ".";
      }

      else if (tone === "persuasive") {
        text = "🔥 Don't miss out! This " + product +
        " is perfect for " + audience + ". Order now!";
      }

      output.innerHTML = text;
      lastResult = text;
    }, 1000);

  } catch (error) {
    document.getElementById("output").innerHTML = "❌ Error in script";
    console.log(error);
  }
}

function copyText() {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult);
}

function clearText() {
  document.getElementById("output").innerHTML = "";
}
</script>
