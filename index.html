<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Copy Studio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:650px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#38bdf8;
}

.lang{
  text-align:center;
  margin-bottom:15px;
}

.lang button{
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-top:15px;
  opacity:0.8;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  box-sizing:border-box;
}

button.generate{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#3b82f6;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button.generate:hover{
  background:#2563eb;
}

.output{
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:10px;
  min-height:120px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">AI Copy Studio</h1>

<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
  <button onclick="setLang('ar')">AR</button>
</div>

<div class="card">

<label id="labelProduct">Product / Service</label>
<input id="product" placeholder="Ex: bracelet">

<label id="labelAudience">Target Audience</label>
<input id="audience" placeholder="Ex: women 20-35">

<label id="labelTone">Tone</label>
<select id="tone">
  <option value="luxury">Luxury</option>
  <option value="friendly">Friendly</option>
  <option value="persuasive">Persuasive</option>
</select>

<button class="generate" onclick="generate()">Generate</button>

<div class="output" id="output">Result...</div>

</div>
</div>

<script>

function setLang(lang){

  const t = {
    en:{
      title:"AI Copy Studio",
      product:"Product / Service",
      audience:"Target Audience",
      tone:"Tone",
      p1:"Ex: bracelet",
      p2:"Ex: women 20-35"
    },
    fr:{
      title:"Studio IA Texte",
      product:"Produit / Service",
      audience:"Public cible",
      tone:"Ton",
      p1:"Ex: bracelet",
      p2:"Ex: femmes 20-35"
    },
    ar:{
      title:"مولّد نصوص ذكي",
      product:"المنتج / الخدمة",
      audience:"الفئة المستهدفة",
      tone:"النمط",
      p1:"مثال: سوار",
      p2:"مثال: نساء 20-35"
    }
  };

  document.getElementById("title").innerText = t[lang].title;
  document.getElementById("labelProduct").innerText = t[lang].product;
  document.getElementById("labelAudience").innerText = t[lang].audience;
  document.getElementById("labelTone").innerText = t[lang].tone;
  document.getElementById("product").placeholder = t[lang].p1;
  document.getElementById("audience").placeholder = t[lang].p2;
}

function generate(){

  let product=document.getElementById("product").value;
  let audience=document.getElementById("audience").value;
  let tone=document.getElementById("tone").value;
  let output=document.getElementById("output");

  if(!product || !audience){
    output.innerHTML="⚠️ Fill all fields";
    return;
  }

  let text="";

  if(tone==="luxury"){
    text="✨ "+product+" designed for "+audience+". Premium quality and elegant style.";
  }

  if(tone==="friendly"){
    text="😊 Meet "+product+"! Perfect for "+audience+". Simple and useful.";
  }

  if(tone==="persuasive"){
    text="🔥 Don't miss "+product+"! Ideal for "+audience+". Order now!";
  }

  output.innerHTML=text;
}

</script>

</body>
</html>
