<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Copy Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 650px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #38bdf8;
  margin-bottom: 10px;
}

.lang {
  text-align: center;
  margin-bottom: 15px;
}

.lang button {
  margin: 3px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

.field {
  margin-top: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  box-sizing: border-box;
}

button.generate {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button.generate:hover {
  background: #2563eb;
}

.output {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  min-height: 120px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">AI Copy Studio</h1>

<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
  <button onclick="setLang('ar')">AR</button>
</div>

<div class="card">

  <div class="field">
    <label id="labelProduct">Product / Service</label>
    <input id="product" placeholder="Ex: bracelet">
  </div>

  <div class="field">
    <label id="labelAudience">Target Audience</label>
    <input id="audience" placeholder="Ex: women 20-35">
  </div>
